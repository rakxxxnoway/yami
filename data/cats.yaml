1:
  name: "абиссинская"
  age: 13
  weight: 5
  desc: >
    Относится к древним породам.
    Это преданный, игривый и умный питомец с переливчатой шерстью.

2:
  name: "американская короткошерстная"
  age: 13
  weight: 6
  desc: >
    Породе присущи восхитительная внешность, крепкое здоровье и покладистый характер.
    Иногда доживают до 20 лет.

3:
  name: "американский бобтейл"
  age: 14
  weight: 6 
  desc: >
    Дружелюбная, любящая, ласковая и излучающая нежность кошка.
    Главная особенность – короткий, как будто обрубленный хвост.

4:
  name: "американский керл"
  age: 15
  weight: 5
  desc: >
    Порода кошек-компаньонов с завернутыми назад ушами, выведенная в США в 80-х годах прошлого века.
    Ласковые, обходительные интеллигенты, запоминающиеся своим неординарным имиджем и фантастическим чувством привязанности к человеку.

5:
  name: "аравийский мау"
  age: 13
  weight: 6
  desc: >
    Ласковый и любознательный, к нему не потребуется особый подход.
    Достаточно только понять и принять его любовь к охоте, страсть к покорению высот и тягу к ежедневным прогулкам.

6:
  name: "балинезийская"
  age: 13
  weight: 4
  desc: >
    Принося в дом этого игривого болтуна, готовьтесь к тому, что понятие личного пространства просто перестанет для вас существовать.

7:
  name: "бамбино"
  age: 13
  weight: 3
  desc: >
    Опознавательные черты представителей породы – короткие лапы, гладкое, почти бесшерстное тело, огромные уши.
    Породе нужен бережный уход, поэтому готовьтесь немного послужить ушастым привередам.

8:
  name: "бенгальская"
  age: 13
  weight: 6
  desc: >
    Маленький домашний леопард.
    В бенгальской породе соединились лучшие черты предков: не только привлекательный внешний вид, но и интеллект, любознательность, активность, дружелюбие.

9:
  name: "бирманская"
  age: 15
  weight: 6
  desc: >
    Бирманские кошки отличаются отменным здоровьем и дружелюбным нравом, обладают тихим и мелодичным голосом.
    Представители этой породы не доставляют хозяевам особых хлопот.

10:
  name: "бомбейская"
  age: 13
  weight: 4
  desc: >
    Выглядит как дикая черная пантера, только в несколько раз меньше размером.
    Любимое времяпрепровождение бомбейца – мурлыкать, лежа на коленях хозяина.


11:
  name: "британская длинношерстная"
  age: 13
  weight: 6
  desc: >
    Примерная и немного ленивая «тучка» с покладистым характером и неискоренимой любовью к лакомствам. 

12:
  name: "британская короткошерстная"
  age: 13
  weight: 6
  desc: >
    Физически развитое, гармонично сложенное животное с легким, уживчивым характером.
    Привлекают спокойным нравом, граничащим с флегматичностью, воспитанностью и невероятно красивой, приятной на ощупь плюшевой шерсткой. 

13:
  name: "бурманская"
  age: 13
  weight: 7
  desc: >
    Короткошёрстная порода с энергичным темпераментом. рассудительность, незаурядный ум и мудрость отличают бурманскую кошку от её сородичей.


14:
  name: "бурмилла"
  age: 13
  weight: 5
  desc: >
    Воплощенное очарование с покладистым характером и неистощимым любопытством, страдающее легкой формой игромании. 

15:
  name: "гавана браун"
  age: 13
  weight: 3
  desc: >
    Живая, активная, игривая, общительная и дружелюбная порода кошек с интересной внешностью и шоколадным окрасом.
    Она совершенно лишена агрессии, легко адаптируется в любом помещении, любит спокойствие и комфорт.

16:
  name: "гималайская"
  age: 15
  weight: 5
  desc: >
    Пушистый голубоглазый «шар», состоящий из сплошного космического обаяния и вселенского добродушия.
    Беспроблемные в плане поведения, в меру флегматичные, но при этом игривые.

17:
  name: "девон-рекс" 
  age: 14
  weight: 3
  desc: >
    Ушастый «англичанин» с мягкой, волнистой шерсткой и огромными глазами.
    Отличается любопытным, бесконфликтным характером и почти собачьей преданностью хозяину.

18:
  name: "донской сфинкс"
  age: 13
  weight: 4
  desc: >
    Яркая, неординарная внешность в сочетании с нетипичной для кошачьего семейства мягкостью характера и сильной зависимостью от владельца.

19:
  name: "европейская короткошерстная"
  age: 16
  weight: 6
  desc: >
    Довольно простая на вид порода, но смышленая, очень ласковая и тихая.

20:
  name: "египетская мау"
  age: 14
  weight: 4
  desc: >
    Эта порода не из общительных: мау редко издают громкое мяуканье и любят «делиться» своим мнением с помощью мурчания.
    Относятся с нежностью и любовью ко всем членам семьи, а особенно – к человеку, которого считают хозяином.

21:
  name: "канадский сфинкс"
  age: 15
  weight: 5
  desc: >
    Любвеобильный и общительный питомец, который легко завоевывает сердца неравнодушных к кошкам людей.

22:
  name: "кимрик"
  age: 11
  weight: 5
  desc: >
    Ласковая, деликатная компаньонка с развитым охотничьим инстинктом и умиротворяюще тихим голосом.
    Она сообразительна, в меру активна, не страдает гипертрофированным стремлением к независимости.

23:
  name: "кинкалоу"
  age: 14
  weight: 3
  desc: >
    Любопытный добродушный лилипут, безмерно обожающий тактильный контакт с хозяином и подвижные игры.
    Он аккуратен в быту, не злопамятен и всегда готов уютно помурчать у вас под боком. единственный минус породы – ее абсолютная уязвимость перед лицом опасности.

24:
  name: "корат"
  age: 13
  weight: 3
  desc: >
    Очень ревнивы; отличные родители; одна из немногих чистых пород, то есть не выведена человеком искусственно.
    Требовательный и настойчивый характер.

25:
  name: "корниш-рекс"
  age: 15
  weight: 4
  desc: >
    То животное, которое доберётся до самого высокого ящика, наиболее труднодоступного уголка ваших апартаментов.
    Считается одной из самых активных пород кошек.

26:
  name: "курильский бобтейл"
  age: 13
  weight: 6
  desc: >
    Спокойные, мирные и дружелюбные. проявляют по-настоящему собачью преданность членам семьи, в которой они живут.
    Любимчиком часто становится один человек.

27:
  name: "лаперм"
  age: 16
  weight: 4
  desc: >
    Одна из самых привязанных к человеку и контактных пород.
    Умеренно разговорчивы, но мяуканье у них тихое и не раздражающее слух.

28:
  name: "манчкин"
  age: 14
  weight: 3
  desc: >
    Игривые, ласковые и дружелюбные создания.
    Подвижны и любознательны, часто становятся на задние лапы.
    Легко уживаются в большой семье, ладят с другими питомцами и детьми.

29:
  name: "мейн-кун"
  age: 13
  weight: 8
  desc: >
    Порода с мощным телосложением и пушистой шерстью.
    Известна дружелюбием и интеллектом, хорошо уживается с семьей.
    Эти обаятельные гиганты обладают развитым интеллектом, но при этом абсолютно не злопамятны. 

30:
  name: "меконгский бобтейл"
  age: 23
  weight: 4
  desc: >
    Отличается спокойным ласковым нравом и преданностью.
    Короткошерстная и короткохвостая кошка.
    Элегантное сильное животное обладает дружелюбным характером.

31:
  name: "минскин"
  age: 14
  weight: 3
  desc: >
    Сложно найти более привязанное к человеку существо, чем эти милые коротконожки.
    И еще сложнее отыскать кошку, способную ужиться почти с любым представителем фауны, как это делает минскин.

32:
  name: "мэнкс"
  age: 13
  weight: 5
  desc: >
    Иногда доживают до 20 лет.
    Миролюбивы, интеллигентны, спокойны, послушны, неприхотливы, быстро приспосабливаются к изменениям, нуждаются во внимании, а не получая его достаточно, могут обижаться.

33:
  name: "невская маскарадная"
  age: 17
  weight: 7
  desc: >
    Отличается жизнерадостностью, сообразительностью, любопытством, очень ласкова и дружелюбна.

34:
  name: "немецкий рекс"
  age: 14
  weight: 4
  desc: >
    Активные, преданные друзья, обладают высоким интеллектом.
    Рекомендуется для людей, страдающих аллергией на кошачью шерсть (но не на кошачий белок).

35:
  name: "нибелунг"
  age: 17
  weight: 5
  desc: >
    Общительные кошки, которые не откажутся от увлекательной игры.
    Вместе с тем представители породы не навязывают свою компанию и редко беспокоят окружающих громким мяуканьем.
    Не любят компании и едва ли мирятся с обществом назойливых гостей.

36:
  name: "норвежская лесная"
  age: 17
  weight: 6
  desc: >
    Дружелюбный и независимый питомец, который легко найдет «ключик» к каждому члену семьи, очень подвижна и игрива, плохо переносит вынужденное одиночество.

37:
  name: "ориентал"
  age: 17
  weight: 5
  desc: >
    Интеллектуалки, спортсменки и, наконец, просто красавицы.
    Их нужно уважать, уделять максимум времени и внимания, предоставлять в личное пользование собственные колени, чтобы можно было вдоволь на них поваляться.

38:
  name: "оцикет"
  age: 16
  weight: 3
  desc: >
    Коммуникабельный проныра с пластикой дикой пантеры и умеренно мягким характером.
    У него врожденная «мания сопровождения» хозяина, породу рекомендуют людям, успевшим пресытиться кошачьей независимостью и желающим видеть рядом с собой участливого, игривого друга.

39:
  name: "персидская"
  age: 17
  weight: 5
  desc: >
    Интеллект и царственные манеры поведения с удивительной привязчивостью и искренней любовью к своему хозяину.

40:
  name: "петерболд"
  age: 14
  weight: 4
  desc: >
    Кошка-говорун, утонченная топ-модель с мечтательным взглядом и ушами летучей мыши, которая ни дня не может прожить без объятий и задушевных бесед с владельцем.

41:
  name: "пиксибоб"
  age: 13
  weight: 5
  desc: >
    Кроткий нрав, преданность и развитый интеллект, им по душе активные игры, прогулки и максимальное участие в жизни хозяина.
    Очень тактичны и не докучают до тех пор, пока их не позовут по имени.

42:
  name: "рагамаффин"
  age: 13
  weight: 6
  desc: >
    Порода неконфликтна и обладает фантастическим терпением по отношению к детям и домашним питомцам.
    Изнеженные и комфортозависимые существа.
    Им чужды высокомерие, самостоятельность и умение постоять за собственные интересы.

43:
  name: "русская голубая"
  age: 17
  weight: 4 
  desc: >
    Ненавязчивые и деликатные, они не станут беспокоить вас ночными «ораториями» и требованиями ежеминутных ласк, способны развлечь себя сами.
    При появлении в доме незнакомца стараются отойти подальше либо спрятаться.

44:
  name: "рэгдолл"
  age: 13
  weight: 6
  desc: >
    Деликатна, спокойна, дружелюбна и беззаветно предана своему хозяину.
    Одна из крупнейших домашних кошек, третья после саванны и мейн-куна.

45:
  name: "саванна"
  age: 18
  weight: 14
  desc: >
    Исключительная преданность хозяину, чем они очень напоминают собак.
    У них феноменальная память, живой ум и страсть к активному образу жизни, не приживутся в квартирах с дефицитом свободной площади.
    Приятельские отношения предпочитают выстраивать с собаками. 

46:
  name: "селкирк-рекс"
  age: 16
  weight: 6
  desc: >
    Добродушен, игрив и на редкость коммуникабелен.
    Этот пушистый здоровяк не перевернет квартиру вверх дном и уж точно не выпустит когти, если его «достали» чересчур горячие объятия.

47:
  name: "сиамская"
  age: 16
  weight: 6
  desc: >
    Испытывают сильную привязанность к хозяину и плохо переносят одиночество, однако большинство сиамов слишком ревнивы, чтобы делить внимание человека с другими животными в доме, поэтому назвать их неконфликтными сложно.

48:
  name: "сибирская"
  age: 18
  weight: 8
  desc: >
    Роскошная внешность, великолепный характер, интеллект и преданность.
    Эти кошки сочетают в себе мощь и грациозность, нежность и независимость, игривость и чувство собственного достоинства.

49:
  name: "сингапурская"
  age: 13
  weight: 2
  desc: >
    Самая маленькая порода кошек в мире, которая отличается необыкновенной изящностью, озорным характером, привязанностью к людям и сообразительностью.

50:
  name: "скукум"
  age: 13
  weight: 4
  desc: >
    Очень игривые и любвеобильные.
    Насколько милыми и пушистыми они выглядят, настолько же эти характеристики соответствуют их характеру.

51:
  name: "сноу-шу"
  age: 13
  weight: 4
  desc: >
    Все самое лучшее, что вы знаете об уме, характере и поведении пушистых питомцев, воплотилось в этой породе.
    Более эффектную, грациозную, умную, активную и в то же время абсолютно не высокомерную и не злопамятную любимицу, чем сноу-шу, просто не найти.

52:
  name: "сококе"
  age: 14
  weight: 4
  desc: >
    Нежная и влюбчивая, но очень свободолюбивая. активная, игривая и независимая кошка.
    Любой волосок на шкурке имеет светлые и темные полоски, это выглядит как будто бы один цвет «припудрен» другим.

53:
  name: "сомалийская"
  age: 14
  weight: 4
  desc: >
    Часто сравнивают с маленькой лисой из-за схожести окраса и шубки.
    Это здоровые, энергичные и умные кошки, которые подойдут людям с активным образом жизни.
    Любят играть и их не рекомендуется надолго оставлять одних.

54:
  name: "тайская"
  age: 14
  weight: 4
  desc: >
    Одна из самых контактных пород и прекрасно поладит не только со всеми членами вашей семьи, но и с другими домашними животными, хотя и будет пытаться над ними доминировать. 

55:
  name: "тойгер"
  age: 15
  weight: 8
  desc: >
    Обладает дружелюбным, компанейским характером. Неконфликтные, уравновешенные, искренне привязанные к человеку и дому.

56:
  name: "тонкинская"
  age: 13
  weight: 4
  desc: >
    Очень дружелюбная, ласковая и любознательная.
    Обладают покладистым характером, благодарные, привязаны ко всем членам семьи.
    Тонкинские кошки очень игривы, с удовольствием общаются с детьми.

57:
  name: "турецкая ангора"
  age: 13
  weight: 3
  desc: >
    Привязываются только к одному хозяину, поэтому прекрасно подходят одиноким людям.
    Без проблем уживаются в большой семье и вместе с другими животными, но в силу инстинктов начинают охоту за более мелкими питомцами.
    Эти кошки никогда громко не мяукают, любят охотиться и играть, умны.

58:
  name: "турецкий ван"
  age: 16
  weight: 6
  desc: >
    Непривередливые игривые котейки, предпочитающие ленивому комфорту спортивные рекорды, а скучным поглаживаниям – энергозатратные развлечения.

59:
  name: "уральский рекс"
  age: 14
  weight: 4
  desc: >
    Легко находит общий язык с любым живым существом, кроме представителей семейства грызунов.
    Одиночество породу не просто раздражает, но и повергает в настоящую депрессию.

60:
  name: "хайленд-фолд"
  age: 13
  weight: 5
  desc: >
    Невероятно миролюбивый, покладистый характер.
    Это не коты-разбойники, планомерно уничтожающие интерьер и промышляющие охотой на зазевавшихся хомяков, а вполне корректные и доброжелательные питомцы.

61:
  name: "чаузи"
  age: 13
  weight: 10
  desc: >
    Несмотря на внешнее сходство с опасными хищниками, чаузи нуждаются в ласке и заботе не меньше своих одомашненных собратьев. 
    Общительный и дружелюбный характер.

62:
  name: "шантильи-тиффани"
  age: 15
  weight: 3
  desc: >
    Из-за уничтоженного породного архива, сведений о характерных повадках шантильи сохранилось очень мало. 
    Принято считать, что главными признаками породы всегда были умеренность и легкая аристократичность поведения.

63:
  name: "шартрез"
  age: 13
  weight: 5
  desc: >
    Известен покладистым нравом и умением находить общий язык с окружающими, способен легко переносить одиночество. 
    Отличительная черта шартрезов – деликатное мяуканье.

64:
  name: "шиншилла"
  age: 13
  weight: 6
  desc: >
    Общее название для кошек британской, персидской и шотландской пород, имеющих нетипичный серебристый, золотой или затушеванный окрас шерсти.
    Самый ценный и, соответственно, дорогой окрас шиншилл – золотой. 
    Животные с серебристой шерстью считаются более дешевыми и встречаются чаще.

65:
  name: "шотландская вислоухая"
  age: 13
  weight: 5
  desc: >
    Благородный нрав, очень высокий уровень интеллекта и природная игривость, чувство собственного достоинства и искренняя привязанность к дому и хозяевам создают неповторимый образ, отличающий шотландскую вислоухую кошку.


66:
  name: "шотландская прямоухая"
  age: 13
  weight: 5
  desc: >
    Серьезные плюшевые интеллигенты, не терпящие фамильярности, но умеющие создавать атмосферу уюта и умиротворения в любом месте, где бы ни находились.
    Как истинные шотландцы, они предпочитают не демонстрировать собственные эмоции кому попало, выбирая для этого «таинства» только проверенного человека.

67:
  name: "экзотическая"
  age: 13
  weight: 4
  desc: >
    Отлично ладят с детьми и другими питомцами, охотно посвящают время подвижным играм. 
    Очень умны, миролюбивы, доброжелательны и терпеливы, что позволяет назвать породу одной из самых безопасных для домашнего содержания. 
    От одиночества эти милые создания просто страдают.

68:
  name: "эльф"
  age: 13
  weight: 6
  desc: >
    Эльфы очень ласковые, дружелюбные, любят детей. одна из основных характеристик эльфов – общительность.
    Это очень ласковые кошки, готовые бесконечно проводить время с хозяином, тереться о его ноги, ходить за ним по пятам.
    Не терпят одиночества, поэтому порода не подойдет очень занятым людям.

69:
  name: "яванез"
  age: 13
  weight: 3
  desc: >
    Очень контактная и склонная к частой вокализации порода, поэтому не подойдет любителям независимых молчаливых питомцев.
    Не конфликтуют с остальными домашними питомцами, включая собак. исключение – любые грызуны и птицы.

70:
  name: "японский бобтейл"
  age: 15
  weight: 5
  desc: >
    Они не очень дружелюбно относятся к незнакомым людям.
    Это существа, обладающие фантастической любознательностью и суперпрыгучестью, они любят ловить насекомых и мелких зверьков.
    Такая азартность чревата травмами: увлекшийся кот может легко выпрыгнуть в окно или свалиться с балкона.
    Отличаются завидным здоровьем и не страдают от генетических недугов.